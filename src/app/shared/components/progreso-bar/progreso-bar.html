<div class="progreso-container">
  <div class="barra-progreso" role="progressbar" [attr.aria-valuenow]="porcentaje()" aria-valuemin="0" aria-valuemax="100">
    @for (i of segmentos(); track i) {
      <div class="progreso-segmento" [class.completado]="i < completados()"></div>
    }
  </div>
  <p class="progreso-texto">{{ completados() }} DE {{ total() }} TAREAS COMPLETADAS</p>
</div>
