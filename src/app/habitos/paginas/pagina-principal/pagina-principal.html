<main class="panel activo" aria-label="Panel de seleccion de momento del dia">
  <app-cabecera-fuvi
    titulo="ELIGE EL MOMENTO DEL DIA"
    [avatar]="avatarPrincipal()"
    [mostrarBotonConfiguracion]="true"
  />

  <section class="momentos-section" aria-label="Seleccion de momento del dia">
    <a class="momento-card" [routerLink]="['/rutinas', 'manana']" aria-label="Rutinas de manana">
      <div class="momento-pictograma">
        <img ngSrc="/assets/images/momento-manana.svg" alt="Pictograma de mañana" width="180" height="180" />
      </div>
      <h2>MAÑANA</h2>
    </a>

    <a class="momento-card" [routerLink]="['/rutinas', 'mediodia']" aria-label="Rutinas de mediodia">
      <div class="momento-pictograma">
        <img
          ngSrc="/assets/images/momento-mediodia.svg"
          alt="Pictograma de mediodia"
          width="180"
          height="180"
        />
      </div>
      <h2>MEDIODIA</h2>
    </a>

    <a class="momento-card" [routerLink]="['/rutinas', 'noche']" aria-label="Rutinas de noche">
      <div class="momento-pictograma">
        <img ngSrc="/assets/images/momento-noche.svg" alt="Pictograma de noche" width="180" height="180" />
      </div>
      <h2>NOCHE</h2>
    </a>
  </section>
</main>
